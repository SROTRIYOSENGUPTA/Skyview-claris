# Render.com deployment configuration for SkyView Claris
# Docs: https://render.com/docs/render-yaml-reference

services:
  - type: web
    name: skyview-skyler
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120 --bind 0.0.0.0:$PORT --log-level info
    plan: starter          # upgrade to standard for production traffic
    region: oregon         # change to closest region (oregon / frankfurt / singapore)
    healthCheckPath: /health

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false         # you will paste this in the Render dashboard — never commit it

      - key: FLASK_SECRET_KEY
        generateValue: true # Render auto-generates a secure random value

      - key: FLASK_ENV
        value: production

    # Auto-deploy whenever you push to main branch
    # Connect your GitHub repo in the Render dashboard to enable this.

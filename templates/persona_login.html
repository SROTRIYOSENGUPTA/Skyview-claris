<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claris — SkyView Advisor Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0F2744 0%, #1a3a5c 50%, #0F2744 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 48px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .logo { font-size: 12px; letter-spacing: 3px; color: #6ba3d6; margin-bottom: 8px; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { color: #8aa8c7; font-size: 14px; margin-bottom: 32px; }
        .sso-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px 24px;
            background: #2E75B6; color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 500; cursor: pointer;
            transition: background 0.2s;
        }
        .sso-btn:hover { background: #3584c8; }
        .sso-btn svg { width: 20px; height: 20px; }
        .divider {
            display: flex; align-items: center; gap: 16px;
            margin: 24px 0; color: #5a7a96; font-size: 12px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .dev-form { display: flex; flex-direction: column; gap: 12px; }
        .dev-form input {
            padding: 12px 16px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff; font-size: 14px; font-family: 'Inter', sans-serif;
        }
        .dev-form input::placeholder { color: #5a7a96; }
        .dev-form input:focus { outline: none; border-color: #2E75B6; }
        .dev-btn {
            padding: 12px 24px; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent; color: #8aa8c7;
            font-size: 14px; cursor: pointer; transition: all 0.2s;
        }
        .dev-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .note {
            margin-top: 24px; font-size: 11px; color: #5a7a96;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">SKYVIEW INVESTMENT ADVISORS</div>
        <h1>Claris</h1>
        <p class="subtitle">Multi-Persona Advisor Platform</p>

        <a href="/persona/login" class="sso-btn" id="sso-link">
            <svg viewBox="0 0 23 23" fill="none"><path d="M1 1h10v10H1V1z" fill="#F25022"/><path d="M12 1h10v10H12V1z" fill="#7FBA00"/><path d="M1 12h10v10H1V12z" fill="#00A4EF"/><path d="M12 12h10v10H12V12z" fill="#FFB900"/></svg>
            Sign in with Microsoft
        </a>

        <div class="divider">or sign in with email (dev mode)</div>

        <form class="dev-form" action="/persona/login/dev" method="POST">
            <input type="email" name="email" placeholder="you@skyviewadv.com" required autocomplete="email">
            <button type="submit" class="dev-btn">Sign In (Dev Mode)</button>
        </form>

        <p class="note">
            This is the internal SkyView advisor platform. Access is restricted to
            registered employees. Contact the technology team if you need access.
        </p>
    </div>
</body>
</html>
